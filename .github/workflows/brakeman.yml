name: Brakeman vulnerabilities check
on: [push]

jobs:
  brakeman:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.4'

      - name: Install dependencies
        run: bundle install

      - name: Run Brakeman
        run: brakeman --format github --no-pager --exit-on-warn
